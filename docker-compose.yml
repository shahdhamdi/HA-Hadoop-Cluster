version: "3.9"

services:
  node01:
    build:
      context: .
      dockerfile: Dockerfile
    image: hadoop-cluster:latest
    container_name: node01
    hostname: node01
    ports:
      - "9871:9870"   # NameNode Web UI
      - "8081:8088"   # ResourceManager Web UI
      - "8481:8485"   # JournalNode RPC
      - "2181:2181"   # ZooKeeper client
    volumes:
      - ./shared:/shared
      - node01-data:/opt/hadoop/data
      - node01-zk:/opt/zookeeper/data
    networks:
      - cluster-network
    environment:
      - NODE_ROLE=node01
    healthcheck:
      test: ["CMD-SHELL", "jps | grep -q NameNode"]
      interval: 10s
      timeout: 5s
      retries: 5

  node02:
    image: hadoop-cluster:latest
    container_name: node02
    hostname: node02
    ports:
      - "9872:9870"   # NameNode Web UI
      - "8082:8088"   # ResourceManager Web UI
      - "8482:8485"   # JournalNode RPC
      - "2182:2181"
    volumes:
      - ./shared:/shared
      - node02-data:/opt/hadoop/data
      - node02-zk:/opt/zookeeper/data
    networks:
      - cluster-network
    environment:
      - NODE_ROLE=node02

  node03:
    image: hadoop-cluster:latest
    container_name: node03
    hostname: node03
    ports:
      - "8483:8485"   # JournalNode RPC
      - "2183:2181"   # ZooKeeper client
      - "8083:8042"   # NodeManager Web UI
    volumes:
      - ./shared:/shared
      - node03-data:/opt/hadoop/data
      - node03-zk:/opt/zookeeper/data
    networks:
      - cluster-network
    environment:
      - NODE_ROLE=node03

  node04:
    image: hadoop-cluster:latest
    container_name: node04
    hostname: node04
    ports:
      - "8084:8042"   # NodeManager Web UI
    volumes:
      - ./shared:/shared
      - node04-data:/opt/hadoop/data
    networks:
      - cluster-network
    environment:
      - NODE_ROLE=node04


  node05:
    image: hadoop-cluster:latest
    container_name: node05
    hostname: node05
    ports:
      - "8085:8042"   # NodeManager Web UI
    volumes:
      - ./shared:/shared
      - node05-data:/opt/hadoop/data
    networks:
      - cluster-network
    environment:
      - NODE_ROLE=node05


networks:
  cluster-network:
    driver: bridge